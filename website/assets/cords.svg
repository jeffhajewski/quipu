<svg xmlns="http://www.w3.org/2000/svg" width="620" height="520" viewBox="0 0 620 520" role="img" aria-labelledby="title desc">
  <title id="title">Quipu cord memory diagram</title>
  <desc id="desc">A calm diagram of cords and knots connected to a simple evidence, fact, and retrieval pipeline.</desc>
  <defs>
    <style>
      .paper { fill: #fbf8f0; }
      .line { stroke: #d9cdb8; stroke-width: 1; fill: none; }
      .cord { stroke: #9f6b43; stroke-width: 5; stroke-linecap: round; fill: none; }
      .cord2 { stroke: #2d6f66; stroke-width: 4; stroke-linecap: round; fill: none; }
      .knot { fill: #f6f1e7; stroke: #9f6b43; stroke-width: 3; }
      .node { fill: #ffffff; stroke: #2d6f66; stroke-width: 2; }
      .ink { fill: #1d211f; font: 700 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #66706a; font: 600 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; letter-spacing: 0; }
    </style>
  </defs>

  <rect class="paper" width="620" height="520"/>
  <path class="line" d="M72 78H548M72 442H548M118 48V472M502 48V472"/>
  <path class="line" d="M72 170H548M72 262H548M72 354H548"/>

  <path class="cord" d="M150 94C164 132 163 168 150 207S135 288 151 330S166 404 152 454"/>
  <path class="cord" d="M206 94C222 145 217 199 199 242S186 333 207 454"/>
  <path class="cord2" d="M260 94C274 142 274 198 259 242S242 338 260 454"/>
  <path class="cord" d="M314 94C332 155 326 218 310 270S298 374 314 454"/>

  <circle class="knot" cx="150" cy="174" r="13"/>
  <circle class="knot" cx="155" cy="312" r="10"/>
  <circle class="knot" cx="204" cy="228" r="12"/>
  <circle class="knot" cx="210" cy="362" r="14"/>
  <circle class="knot" cx="260" cy="152" r="10"/>
  <circle class="knot" cx="256" cy="286" r="13"/>
  <circle class="knot" cx="312" cy="214" r="11"/>
  <circle class="knot" cx="309" cy="390" r="12"/>

  <rect class="node" x="384" y="122" width="126" height="56"/>
  <rect class="node" x="384" y="232" width="126" height="56"/>
  <rect class="node" x="384" y="342" width="126" height="56"/>

  <text class="ink" x="406" y="154">evidence</text>
  <text class="small" x="407" y="170">RAW EVENTS</text>
  <text class="ink" x="424" y="264">facts</text>
  <text class="small" x="405" y="280">VALID IN TIME</text>
  <text class="ink" x="405" y="374">context</text>
  <text class="small" x="405" y="390">PACKET + CITES</text>

  <path class="line" d="M327 214H384"/>
  <path class="line" d="M327 286H384"/>
  <path class="line" d="M327 390H384"/>

  <text class="small" x="72" y="55">QUIPU / KEE-POO</text>
  <text class="small" x="393" y="55">LOCAL MEMORY MAP</text>
  <text class="small" x="72" y="488">STORE EVIDENCE -> DERIVE FACTS -> RETRIEVE CONTEXT</text>
</svg>
