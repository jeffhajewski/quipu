{
  "name": "longmemeval_synthesis_lab",
  "version": "0.1.0",
  "metadata": {
    "format": "quipu.external.scenario.v1",
    "benchmark": "longmemeval",
    "datasetName": "LongMemEval synthesis lab",
    "datasetVersion": "lab-0.1.0",
    "source": "handwritten LongMemEval-flavored synthesis regression suite",
    "license": "MIT",
    "downloadRequired": false,
    "tasks": [
      "abstention",
      "single-session-preference",
      "temporal-reasoning",
      "multi-session",
      "knowledge-update",
      "single-session-user",
      "single-session-assistant"
    ]
  },
  "suites": ["longmemeval", "synthesis_lab"],
  "scenarios": [
    {
      "scenarioId": "lab_trip_updates",
      "metadata": {"description": "Trip facts with stale and current values"},
      "actors": [
        {"id": "user", "type": "user", "name": "User"},
        {"id": "assistant", "type": "agent", "name": "Assistant"}
      ],
      "events": [
        {
          "eventId": "trip_hotel_old",
          "time": "2026-01-05T09:00:00Z",
          "type": "message",
          "messages": [{"role": "user", "content": "For the Denver conference trip, the hotel is Harbor Inn."}],
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "groundTruthMemories": ["trip.hotel.old"]
        },
        {
          "eventId": "trip_flight",
          "time": "2026-01-08T09:00:00Z",
          "type": "message",
          "messages": [{"role": "user", "content": "For the Denver conference trip, my flight leaves at 8:10 AM."}],
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "groundTruthMemories": ["trip.flight"]
        },
        {
          "eventId": "trip_hotel_new",
          "time": "2026-02-01T09:00:00Z",
          "type": "message",
          "messages": [{"role": "user", "content": "Update the Denver conference trip hotel to Lakeside Suites instead of Harbor Inn."}],
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "groundTruthMemories": ["trip.hotel.current"]
        },
        {
          "eventId": "trip_dinner",
          "time": "2026-02-03T09:00:00Z",
          "type": "message",
          "messages": [{"role": "user", "content": "For the Denver trip, the team dinner is at 7 PM."}],
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "groundTruthMemories": ["trip.dinner"]
        }
      ],
      "queries": [
        {
          "queryId": "trip_q_current_hotel",
          "time": "2026-02-10T10:00:00Z",
          "query": "What is my current Denver conference trip hotel?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "Lakeside Suites",
          "expectedEvidenceEventIds": ["trip_hotel_new"],
          "mustNotUseEventIds": ["trip_hotel_old"],
          "category": "knowledge-update",
          "shouldAbstain": false
        },
        {
          "queryId": "trip_q_jan20_hotel",
          "time": "2026-01-20T10:00:00Z",
          "query": "What was my Denver conference trip hotel on January 20?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "Harbor Inn",
          "expectedEvidenceEventIds": ["trip_hotel_old"],
          "mustNotUseEventIds": ["trip_hotel_new"],
          "category": "temporal-reasoning",
          "shouldAbstain": false
        },
        {
          "queryId": "trip_q_after_update",
          "time": "2026-02-02T10:00:00Z",
          "query": "After the February update, which Denver hotel should I use?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "Lakeside Suites",
          "expectedEvidenceEventIds": ["trip_hotel_new"],
          "mustNotUseEventIds": ["trip_hotel_old"],
          "category": "knowledge-update",
          "shouldAbstain": false
        },
        {
          "queryId": "trip_q_flight_time",
          "time": "2026-02-10T10:00:00Z",
          "query": "What flight time was recorded for the Denver trip?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "8:10 AM",
          "expectedEvidenceEventIds": ["trip_flight"],
          "mustNotUseEventIds": [],
          "category": "temporal-reasoning",
          "shouldAbstain": false
        },
        {
          "queryId": "trip_q_rental_car",
          "time": "2026-02-10T10:00:00Z",
          "query": "What is the Denver trip rental car company?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "[abstain]",
          "expectedEvidenceEventIds": ["trip_flight"],
          "mustNotUseEventIds": [],
          "category": "abstention",
          "shouldAbstain": true
        },
        {
          "queryId": "trip_q_added_details",
          "time": "2026-02-10T10:00:00Z",
          "query": "Which two Denver trip details changed or were added across sessions?",
          "scope": {"tenantId": "benchmark:longmemeval", "projectId": "lab:trip"},
          "expectedAnswer": "hotel and dinner",
          "expectedEvidenceEventIds": ["trip_hotel_new", "trip_dinner"],
          "mustNotUseEventIds": [],
          "category": "multi-session",
          "shouldAbstain": false
        }
      ],
      "forgetOps": []
    },
