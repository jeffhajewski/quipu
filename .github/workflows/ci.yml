name: CI

on:
  push:
  pull_request:

jobs:
  scaffold:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Build system LatticeDB
        run: |
          git clone --depth 1 https://github.com/jeffhajewski/latticedb.git "$RUNNER_TEMP/latticedb"
          cd "$RUNNER_TEMP/latticedb"
          zig build -Doptimize=ReleaseSafe
          {
            echo "LATTICE_INCLUDE=$RUNNER_TEMP/latticedb/zig-out/include"
            echo "LATTICE_LIB_DIR=$RUNNER_TEMP/latticedb/zig-out/lib"
            echo "LD_LIBRARY_PATH=$RUNNER_TEMP/latticedb/zig-out/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          } >> "$GITHUB_ENV"

      - name: Install TypeScript SDK dependencies
        working-directory: sdk/typescript
        run: npm install

      - name: Check formatting
        run: python3 scripts/check_format.py --check

      - name: Run tests
        run: python3 scripts/run_tests.py
